name: Deploy — Production

# Manual trigger only. Production deployments require explicit confirmation.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "ECR image tag to deploy (e.g. git SHA from a staging deploy)"
        required: true
      confirm:
        description: "Type DEPLOY to confirm"
        required: true

env:
  AWS_REGION: af-south-1
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER_PRODUCTION }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE_PRODUCTION }}

jobs:
  deploy:
    name: Deploy API to production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate confirmation
        if: inputs.confirm != 'DEPLOY'
        run: |
          echo "::error::Confirmation input must be exactly 'DEPLOY'. Got: ${{ inputs.confirm }}"
          exit 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag image as production-latest
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name $ECR_REPOSITORY \
            --image-ids imageTag=$IMAGE_TAG \
            --query 'images[0].imageManifest' \
            --output text)
          aws ecr put-image \
            --repository-name $ECR_REPOSITORY \
            --image-tag production-latest \
            --image-manifest "$MANIFEST"

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE \
            --force-new-deployment \
            --region $AWS_REGION

      - name: Wait for deployment to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE \
            --region $AWS_REGION
